name: MLOps Continuous Integration

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  quality-and-test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install httpx pytest

    - name: Run Unit Tests
      run: |
        pytest

  build-container:
    needs: quality-and-test
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: actions/configure-pages-action@v5 # Setting up container environment tools
      
    - name: Build Docker Image
      run: |
        docker build -t real-time-fraud-detector:${{ github.sha }} .
        print("✅ Container built successfully inside GitHub Actions runner.")